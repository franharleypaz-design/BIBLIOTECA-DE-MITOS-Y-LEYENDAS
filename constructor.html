<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constructor de Estrategia - Crónicas del Reino</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="constructor.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="body-constructor">

    <header class="main-header">
        <div class="header-identity-block">
            <div class="logo-container" onclick="location.href='grimorio.html'" style="cursor:pointer;">
                <img src="logo-fenix.png" alt="Fénix MyL" class="main-logo">
                <div class="logo-text">
                    <h1 id="constructor-title">TALLER DE ESTRATEGIA</h1>
                    <p class="subtitle" id="slot-id-display">SINCRONIZANDO REGISTROS...</p>
                </div>
            </div>
        </div>
        <div class="header-action-block">
            <button onclick="location.href='grimorio.html'" class="btn-salir">SALIR DEL TALLER</button>
        </div>
    </header>

    <main class="constructor-layout">
        
        <div id="setup-mazo" class="setup-rules-panel">
            <h3>⚖️ REGLAS:</h3>
            <select id="select-bloque" onchange="actualizarSetup()">
                <option value="">ELEGIR ERA...</option>
                <option value="primera-era">PRIMERA ERA (Reto a Dragón)</option>
                <option value="segunda-era">SEGUNDA ERA (Espada a Ra)</option>
            </select>
            <select id="select-formato" onchange="actualizarSetup()">
                <option value="libre">FORMATO LIBRE</option>
                <option value="racial-libre">RACIAL LIBRE</option>
                <option value="racial-edicion">RACIAL EDICIÓN</option>
            </select>
            <select id="select-raza" style="display: none;" onchange="actualizarSetup()">
                <option value="">ELEGIR RAZA...</option>
                <option value="Caballero">CABALLERO</option>
                <option value="Guerrero">GUERRERO</option>
                <option value="Mago">MAGO</option>
                <option value="Sacerdote">SACERDOTE</option>
                <option value="Sombra">SOMBRA</option>
                <option value="Bestia">BESTIA</option>
                <option value="Dragón">DRAGÓN</option>
                <option value="Faerie">FAERIE</option>
            </select>
        </div>

        <aside class="sidebar">
            <div class="filter-group" id="folder-fav-filter" style="display: none;">
                <h3>EXHIBICIÓN</h3>
                
                <button id="btn-show-owned" class="btn-mystick-nav" style="width: 100%; margin-bottom: 10px; justify-content: center;" onclick="toggleMostrarCarpeta()">
                    🗂️ VER MI CARPETA
                </button>
                
                <button id="btn-show-favs" class="btn-mystick-nav" style="width: 100%; justify-content: center;" onclick="toggleMostrarFavoritos()">
                    ⭐ VER FAVORITOS
                </button>
            </div>

            <div class="filter-group">
                <h3>BUSCADOR</h3>
                <input type="text" id="main-search" placeholder="Nombre o Habilidad..." oninput="filtrarCartas()">
            </div>

            <div class="filter-group">
                <h3>FILTRAR POR TIPO</h3>
                <select id="tipo-filter" onchange="filtrarCartas()" style="width: 100%;">
                    <option value="">TODOS LOS TIPOS</option>
                    <option value="Aliado">ALIADO</option>
                    <option value="Talismán">TALISMÁN</option>
                    <option value="Tótem">TÓTEM</option>
                    <option value="Arma">ARMA</option>
                    <option value="Oro">ORO</option>
                </select>
            </div>
            
            <div class="filter-group">
                <h3>RAZA ESPECÍFICA</h3>
                <select id="raza-filter" onchange="filtrarCartas()" style="width: 100%;">
                    <option value="">TODAS LAS RAZAS</option>
                    <option value="Caballero">CABALLERO</option>
                    <option value="Guerrero">GUERRERO</option>
                    <option value="Mago">MAGO</option>
                    <option value="Sacerdote">SACERDOTE</option>
                    <option value="Sombra">SOMBRA</option>
                    <option value="Bestia">BESTIA</option>
                    <option value="Dragón">DRAGÓN</option>
                    <option value="Faerie">FAERIE</option>
                </select>
            </div>
        </aside>

        <section class="content-scroll">
            <div class="card-grid" id="card-display"></div>
        </section>

        <aside class="deck-builder-panel">
            <div class="deck-stats-header">
                <h3 id="current-slot-name">MI ESTRATEGIA</h3>
                <div class="stat-grid">
                    <div>TOTAL: <strong id="total-cards">0</strong> / 50</div>
                    <div>ALIADOS: <strong id="total-aliados">0</strong></div>
                    <div>OROS: <strong id="total-oros">0</strong></div>
                    <div>OTROS: <strong id="total-otros">0</strong></div>
                </div>
                <div id="status-oro-inicial" class="status-oro-alert">
                    ❌ FALTA ORO SIN HABILIDAD
                </div>
            </div>

            <div class="deck-content-scroll" id="deck-list-container">
                </div>

            <div class="deck-actions">
                <button class="btn-save-deck" onclick="guardarMazoFirebase()">GUARDAR CAMBIOS</button>
            </div>
        </aside>

    </main>

    <div id="toast-container"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="app.js"></script>
    <script src="constructor.js"></script>
</body>
</html>
